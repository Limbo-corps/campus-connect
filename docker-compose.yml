name: campusconnect

services:
  postgres:
    image: postgres:17-alpine
    container_name: campusconnect-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: campusconnect
      POSTGRES_PASSWORD: campusconnect

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusconnect -d campusconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - campusconnect

  backend:
    container_name: campusconnect-backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      - POSTGRES_HOST=postgres

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

    ports:
      - "8000:8000"

    networks:
      - campusconnect

  frontend:
    container_name: campusconnect-frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

    ports:
      - "3000:3000"

    networks:
      - campusconnect

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  backend_venv:

networks:
  campusconnect:
    driver: bridge
