<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <g fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- graduation cap -->
    <g transform="translate(34 40) rotate(-8)">
      <path d="M0 8 L24 0 L48 8 L24 16 Z"/>
      <path d="M9 11 V22 Q24 31 39 22 V11"/>
      <path d="M48 8 V21"/>
      <circle cx="48" cy="24" r="2.4"/>
    </g>

    <!-- open book -->
    <g transform="translate(196 46) rotate(7)">
      <path d="M0 4 Q12 -2 22 4 V30 Q12 24 0 30 Z"/>
      <path d="M22 4 Q32 -2 44 4 V30 Q32 24 22 30"/>
    </g>

    <!-- chat bubble + heart -->
    <g transform="translate(244 132)">
      <rect x="0" y="0" width="46" height="32" rx="8"/>
      <path d="M12 32 V42 L24 32"/>
      <path d="M23 9 c-3-4.5-11-2.6-11 3 0 3.8 6 7.6 11 10.6 5-3 11-6.8 11-10.6 0-5.6-8-7.5-11-3z"/>
    </g>

    <!-- pencil -->
    <g transform="translate(54 156) rotate(40)">
      <rect x="0" y="0" width="11" height="32" rx="2"/>
      <path d="M0 32 L5.5 43 L11 32"/>
      <line x1="0" y1="9" x2="11" y2="9"/>
    </g>

    <!-- lightbulb -->
    <g transform="translate(150 206)">
      <circle cx="14" cy="14" r="12"/>
      <path d="M8 27 H20 M9.5 31 H18.5"/>
    </g>

    <!-- four-point sparkle -->
    <g transform="translate(258 250)">
      <path d="M12 0 C13 8 16 11 24 12 C16 13 13 16 12 24 C11 16 8 13 0 12 C8 11 11 8 12 0 Z"/>
    </g>

    <!-- coffee cup -->
    <g transform="translate(36 248)">
      <path d="M2 8 H30 V22 a8 8 0 0 1 -8 8 H10 a8 8 0 0 1 -8 -8 Z"/>
      <path d="M30 12 h5 a5 5 0 0 1 0 10 h-5"/>
      <path d="M10 2 V-4 M18 2 V-4"/>
    </g>

    <!-- small star -->
    <g transform="translate(150 96)">
      <path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z"/>
    </g>
